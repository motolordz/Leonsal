<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Leon's Alphabet Adventure — LeonSal.com</title>
<meta name="description" content="Explore A to Z, find letters, and match pictures with Leon! A playful alphabet learning game for ages 3-7." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#131E36;
    --cloud:#F3F8FF;
    --white:#FFFFFF;
    --yellow:#FFD43B;
    --yellow-deep:#F5B400;
    --green:#3E9B22;
    --green-deep:#2E7A18;
    --shadow:0 14px 28px -10px rgba(19,30,54,0.25);

    --c1:#FF5252; --c2:#FF9636; --c3:#FFD43B; --c4:#B0D936; --c5:#4FAE32;
    --c6:#2FC4D1; --c7:#3AA0FF; --c8:#6C7AE0; --c9:#9D5DC4; --c10:#FF6FA5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:'Nunito',sans-serif;color:var(--navy);
    background:var(--cloud);min-height:100vh;
  }
  h1,h2,.brand{font-family:'Fredoka One',cursive;margin:0;}
  button{font-family:inherit;border:none;cursor:pointer;background:none;}

  .wrap{max-width:560px;margin:0 auto;padding:14px 18px 56px;}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 4px;}
  .brand{font-size:1.05rem;white-space:nowrap;}
  .brand a{text-decoration:none;display:flex;align-items:baseline;gap:1px;}
  .brand .b1{color:#3AA0FF;} .brand .b2{color:#4FAE32;} .brand .b3{color:var(--yellow-deep);
    -webkit-text-stroke:1px var(--navy);} .brand .b4{color:#FF5252;} .brand .b5{color:#2FC4D1;}
  .brand .b6{color:#9D5DC4;} .brand .b7{color:#FF9636;}
  .score-pill{
    background:var(--white);border-radius:999px;padding:8px 16px;font-family:'Fredoka One',cursive;
    font-size:1rem;color:var(--navy);box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;
  }

  /* ---- title ---- */
  .title{text-align:center;margin:14px 0 6px;}
  .title h1{font-size:clamp(1.5rem,7vw,2rem);color:var(--navy);line-height:1.2;}

  /* ---- top-level game tabs ---- */
  .game-tabs{display:flex;gap:8px;margin:16px 0;background:#E7ECF7;border-radius:20px;padding:6px;}
  .game-tab{
    flex:1;padding:12px 4px;border-radius:15px;font-family:'Fredoka One',cursive;
    font-size:.82rem;background:transparent;color:#6B7494;transition:all .18s ease;
  }
  .game-tab.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow);}
  .game-tab:active{transform:scale(.97);}

  .instruction{
    text-align:center;font-weight:800;font-size:1.05rem;color:#3C4566;
    min-height:1.4em;margin-bottom:14px;
  }

  /* ---- play zone ---- */
  .play-zone{
    background:var(--white);border-radius:28px;padding:24px 14px;box-shadow:var(--shadow);
    margin-bottom:18px;display:flex;flex-direction:column;align-items:center;
  }
  .reveal-wrap{display:flex;justify-content:center;align-items:center;min-height:170px;position:relative;padding-bottom:34px;}
  .reveal-caption{text-align:center;font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--navy);margin-top:4px;min-height:1.3em;}
  .reveal-placeholder{
    width:140px;height:140px;border-radius:32%;border:4px dashed #D9E2F5;
    display:flex;align-items:center;justify-content:center;font-size:2.6rem;color:#C8D3EC;
  }

  .choices-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;min-height:120px;align-items:center;}

  /* ---- picker grid (A-Z) ---- */
  .picker-label{text-align:center;font-weight:800;color:#3C4566;margin-bottom:10px;}
  .az-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;}
  .letter-tile{
    border-radius:16px;min-height:54px;display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.15), 0 4px 6px rgba(0,0,0,.18);
    text-shadow:-1px -1px 0 var(--navy),1px -1px 0 var(--navy),-1px 1px 0 var(--navy),1px 1px 0 var(--navy);
    transition:transform .12s ease;
  }
  .letter-tile:active{transform:scale(.9);}

  /* ================= BUDDY CHARACTER (letters) ================= */
  .buddy{position:relative;display:inline-flex;}
  .buddy--choice{font-size:50px;}
  .buddy--reveal{font-size:clamp(56px, 18vw, 78px);}
  .buddy-body{
    width:3.1em;height:3.1em;border-radius:32%;background:var(--buddy-color);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:inset 0 -0.32em 0 rgba(0,0,0,.13), 0 0.18em 0.25em rgba(0,0,0,.18);
    position:relative;
  }
  .buddy-face{display:flex;gap:0.45em;margin-bottom:0.08em;}
  .eye{width:0.46em;height:0.46em;background:#fff;border-radius:50%;position:relative;}
  .eye::after{
    content:"";position:absolute;width:0.2em;height:0.2em;background:var(--navy);
    border-radius:50%;top:58%;left:58%;transform:translate(-50%,-50%);
  }
  .smile{
    width:1em;height:0.55em;border:0.12em solid transparent;border-bottom-color:var(--navy);
    border-radius:50%;margin-top:0.06em;
  }
  .buddy-number{
    font-family:'Fredoka One',cursive;font-size:1.25em;color:#fff;margin-top:0.08em;
    text-shadow:-1px -1px 0 var(--navy),1px -1px 0 var(--navy),-1px 1px 0 var(--navy),1px 1px 0 var(--navy);
  }
  .arm{position:absolute;top:42%;width:0.85em;height:0.42em;background:var(--buddy-color);filter:brightness(.87);border-radius:1em;}
  .arm-l{left:-0.46em;transform:rotate(18deg);}
  .arm-r{right:-0.46em;transform:rotate(-18deg);}
  .foot{position:absolute;bottom:-0.28em;width:0.58em;height:0.42em;background:var(--buddy-color);filter:brightness(.8);border-radius:0.3em;}
  .foot-l{left:0.55em;}
  .foot-r{right:0.55em;}

  .choice-btn{transition:transform .12s ease;}
  .choice-btn:active{transform:scale(.93);}
  .choice-btn.shake{animation:shake .4s ease;}

  .choice-tile{
    width:96px;height:96px;border-radius:24px;display:flex;align-items:center;justify-content:center;
    font-family:'Fredoka One',cursive;font-size:2.6rem;color:#fff;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.15), 0 6px 10px rgba(0,0,0,.18);
    text-shadow:-1.5px -1.5px 0 var(--navy),1.5px -1.5px 0 var(--navy),-1.5px 1.5px 0 var(--navy),1.5px 1.5px 0 var(--navy);
    transition:transform .12s ease;
  }
  .choice-tile:active{transform:scale(.92);}
  .choice-tile.shake{animation:shake .4s ease;}

  /* ---- picture/word match cards ---- */
  .pic-card{
    width:96px;min-height:112px;border-radius:20px;background:var(--white);
    border:4px solid var(--card-color); display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;padding:8px 4px;transition:transform .12s ease;
  }
  .pic-card:active{transform:scale(.93);}
  .pic-card.shake{animation:shake .4s ease;}
  .pic-emoji{font-size:2.4rem;line-height:1;}
  .pic-word{font-family:'Fredoka One',cursive;font-size:.92rem;color:var(--navy);text-align:center;}

  .pop-in{animation:popIn .6s cubic-bezier(.34,1.56,.64,1);}

  @media (prefers-reduced-motion:no-preference){
    .letter-tile{animation:buddyBounce 2.2s ease-in-out infinite;animation-delay:calc(var(--i,0) * 0.05s);}
  }

  @keyframes buddyBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8%);}}
  @keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0;}60%{transform:scale(1.18) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  /* ---- lowercase toggle ---- */
  .case-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
  .case-btn{
    padding:8px 22px;border-radius:999px;font-family:'Fredoka One',cursive;font-size:.95rem;
    background:var(--white);color:#8B93A8;box-shadow:var(--shadow);transition:transform .15s ease;
  }
  .case-btn.active{background:var(--yellow);color:var(--navy);box-shadow:0 6px 0 0 var(--yellow-deep);}
  .case-btn:active{transform:scale(.95);}
  #exploreSection.lowercase .letter-tile,
  #exploreSection.lowercase .buddy-number{text-transform:lowercase;}

  /* ---- say sound button ---- */
  .sound-btn{
    margin-top:10px;padding:10px 20px;border-radius:999px;font-family:'Fredoka One',cursive;
    font-size:.95rem;background:#EAF1FF;color:var(--navy);box-shadow:0 5px 0 0 #C9D8F5;
    transition:transform .15s ease;
  }
  .sound-btn:active{transform:scale(.95);}
  .sound-btn[hidden]{display:none;}

  /* ---- badge toast ---- */
  .badge-toast{
    position:fixed;top:18px;left:50%;z-index:50;
    background:var(--navy);color:#fff;font-family:'Fredoka One',cursive;font-size:1rem;
    padding:14px 22px;border-radius:24px;box-shadow:0 10px 24px rgba(19,30,54,.35);
    display:flex;align-items:center;gap:8px;text-align:center;
    max-width:calc(100vw - 32px);
    animation:badgePopIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes badgePopIn{
    0%{transform:translateX(-50%) scale(0) rotate(-8deg);opacity:0;}
    60%{transform:translateX(-50%) scale(1.12) rotate(4deg);opacity:1;}
    100%{transform:translateX(-50%) scale(1) rotate(0);}
  }
  .badge-toast.fade-out{animation:badgeFade .5s ease forwards;}
  @keyframes badgeFade{ to{opacity:0;transform:translateX(-50%) translateY(-12px);} }

  /* ---- reset stars (small, bottom) ---- */
  .footer-row{text-align:center;margin-top:28px;}
  .btn-reset-stars{
    padding:8px 16px;border-radius:999px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;
    background:transparent;color:#9AA4C2;border:1.5px solid #D9E2F5;
  }
  .btn-reset-stars:active{transform:scale(.95);}

  /* ---- letters found tracker ---- */
  .letters-found{
    text-align:center;font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--navy);
    background:var(--white);box-shadow:var(--shadow);border-radius:999px;
    padding:8px 16px;display:inline-flex;gap:6px;margin:4px auto 0;
  }
  .letters-found-wrap{display:flex;justify-content:center;}

  /* ---- confetti ---- */
  .confetti-layer{position:absolute;inset:0;overflow:visible;pointer-events:none;}
  .confetti-piece{
    position:absolute;top:-10px;width:9px;height:14px;border-radius:2px;
    animation-name:confettiFall;animation-timing-function:ease-in;animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(260px) rotate(360deg);opacity:0;}
  }
  @media (prefers-reduced-motion:reduce){
    .confetti-piece{display:none;}
    .letter-tile{animation:none;}
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <span class="brand">
      <a href="../index.html" aria-label="Back to LeonSal.com home">
        <span class="b1">L</span><span class="b2">e</span><span class="b3">o</span><span class="b4">n</span><span class="b5">S</span><span class="b6">a</span><span class="b7">l</span>
      </a>
    </span>
    <span class="score-pill" id="scorePill" aria-live="polite">⭐ <span id="scoreNum">0</span></span>
  </div>

  <div class="title">
    <h1>Leon's Alphabet Adventure</h1>
  </div>

  <div class="letters-found-wrap">
    <span class="letters-found">🔤 Letters Found: <span id="lettersFoundNum">0</span>/26</span>
  </div>

  <div class="game-tabs" role="group" aria-label="Choose a game mode">
    <button class="game-tab active" id="tabExploreBtn" aria-pressed="true">🔤 Explorer</button>
    <button class="game-tab" id="tabFindBtn" aria-pressed="false">🔍 Find Letter</button>
    <button class="game-tab" id="tabMatchBtn" aria-pressed="false">🖼️ Match Picture</button>
  </div>

  <!-- ================= EXPLORER ================= -->
  <div id="exploreSection">
    <p class="instruction">Tap a letter to start your adventure!</p>

    <div class="case-toggle" role="group" aria-label="Letter case">
      <button class="case-btn active" id="caseUpperBtn" aria-pressed="true">ABC</button>
      <button class="case-btn" id="caseLowerBtn" aria-pressed="false">abc</button>
    </div>

    <div class="play-zone">
      <div class="reveal-wrap" id="exploreRevealWrap">
        <div class="reveal-placeholder">?</div>
      </div>
      <p class="reveal-caption" id="exploreCaption"></p>
      <button class="sound-btn" id="soundBtn" hidden>🔊 Say Sound</button>
    </div>

    <p class="picker-label">Tap any letter, A to Z!</p>
    <div class="az-grid" id="azGrid"></div>
  </div>

  <!-- ================= FIND THE LETTER ================= -->
  <div id="findSection" hidden>
    <p class="instruction" id="findPrompt">Find the letter...</p>

    <div class="play-zone">
      <div class="choices-row" id="findChoices"></div>
    </div>
  </div>

  <!-- ================= MATCH THE PICTURE ================= -->
  <div id="matchSection" hidden>
    <p class="instruction" id="matchPrompt">Which picture starts with this letter?</p>

    <div class="play-zone">
      <div class="reveal-wrap" id="matchLetterWrap" style="min-height:120px;padding-bottom:10px;"></div>
      <div class="choices-row" id="matchChoices"></div>
    </div>
  </div>

  <div class="footer-row">
    <button class="btn-reset-stars" id="resetStarsBtn">Reset Stars</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  var ALPHABET = [
    {letter:'A', word:'Apple',     emoji:'🍎'},
    {letter:'B', word:'Ball',      emoji:'⚽'},
    {letter:'C', word:'Cat',       emoji:'🐱'},
    {letter:'D', word:'Dog',       emoji:'🐶'},
    {letter:'E', word:'Elephant',  emoji:'🐘'},
    {letter:'F', word:'Fish',      emoji:'🐟'},
    {letter:'G', word:'Giraffe',   emoji:'🦒'},
    {letter:'H', word:'Hat',       emoji:'🎩'},
    {letter:'I', word:'Ice Cream', emoji:'🍦'},
    {letter:'J', word:'Juice',     emoji:'🧃'},
    {letter:'K', word:'Kite',      emoji:'🪁'},
    {letter:'L', word:'Lion',      emoji:'🦁'},
    {letter:'M', word:'Monkey',    emoji:'🐵'},
    {letter:'N', word:'Nest',      emoji:'🪺'},
    {letter:'O', word:'Orange',    emoji:'🍊'},
    {letter:'P', word:'Penguin',   emoji:'🐧'},
    {letter:'Q', word:'Queen',     emoji:'👑'},
    {letter:'R', word:'Rainbow',   emoji:'🌈'},
    {letter:'S', word:'Sun',       emoji:'☀️'},
    {letter:'T', word:'Turtle',    emoji:'🐢'},
    {letter:'U', word:'Umbrella',  emoji:'☂️'},
    {letter:'V', word:'Van',       emoji:'🚐'},
    {letter:'W', word:'Whale',     emoji:'🐳'},
    {letter:'X', word:'Xylophone', emoji:'🎹'},
    {letter:'Y', word:'Yo-yo',     emoji:'🪀'},
    {letter:'Z', word:'Zebra',     emoji:'🦓'}
  ];

  var PHONICS = {
    A:'ah', B:'buh', C:'kuh', D:'duh', E:'eh', F:'ff', G:'guh', H:'huh',
    I:'ih', J:'juh', K:'kuh', L:'lluh', M:'mm', N:'nn', O:'oh', P:'puh',
    Q:'kwuh', R:'rr', S:'sss', T:'tuh', U:'uh', V:'vv', W:'wuh', X:'ks',
    Y:'yuh', Z:'zz'
  };

  var COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)',
                'var(--c6)','var(--c7)','var(--c8)','var(--c9)','var(--c10)'];
  function colorFor(i){ return COLORS[i % COLORS.length]; }

  var STORAGE_SCORE_KEY = 'leonsal-alphabet-stars';
  var STORAGE_BADGES_KEY = 'leonsal-alphabet-badges';
  var STORAGE_DISCOVERED_KEY = 'leonsal-alphabet-discovered';
  var SUCCESS_MESSAGES = ['Amazing!', 'Great Job!', 'Fantastic!', 'Super Star!'];
  function randomSuccessMessage(){
    return SUCCESS_MESSAGES[Math.floor(Math.random() * SUCCESS_MESSAGES.length)];
  }
  function loadDiscovered(){
    try{
      var saved = localStorage.getItem(STORAGE_DISCOVERED_KEY);
      return saved ? JSON.parse(saved) : [];
    }catch(e){ return []; }
  }
  function saveDiscovered(list){
    try{ localStorage.setItem(STORAGE_DISCOVERED_KEY, JSON.stringify(list)); }catch(e){ /* storage unavailable */ }
  }
  var BADGES = [
    {threshold:10, name:'Letter Starter'},
    {threshold:25, name:'Alphabet Explorer'},
    {threshold:50, name:'ABC Champion'}
  ];

  function loadScore(){
    try{
      var saved = localStorage.getItem(STORAGE_SCORE_KEY);
      return saved ? (parseInt(saved, 10) || 0) : 0;
    }catch(e){ return 0; }
  }
  function saveScore(score){
    try{ localStorage.setItem(STORAGE_SCORE_KEY, String(score)); }catch(e){ /* storage unavailable — score just won't persist */ }
  }
  function loadShownBadges(){
    try{
      var saved = localStorage.getItem(STORAGE_BADGES_KEY);
      return saved ? JSON.parse(saved) : [];
    }catch(e){ return []; }
  }
  function saveShownBadges(list){
    try{ localStorage.setItem(STORAGE_BADGES_KEY, JSON.stringify(list)); }catch(e){ /* storage unavailable */ }
  }

  function showBadgeToast(name){
    var toast = document.createElement('div');
    toast.className = 'badge-toast';
    toast.textContent = '🏅 Badge unlocked: ' + name + '!';
    document.body.appendChild(toast);
    setTimeout(function(){
      toast.classList.add('fade-out');
      setTimeout(function(){ if (toast.parentNode) toast.parentNode.removeChild(toast); }, 500);
    }, 2400);
  }

  var shownBadges = loadShownBadges();
  function checkBadges(score){
    BADGES.forEach(function(b){
      if (score >= b.threshold && shownBadges.indexOf(b.threshold) === -1){
        shownBadges.push(b.threshold);
        saveShownBadges(shownBadges);
        showBadgeToast(b.name);
      }
    });
  }

  var state = { score: loadScore() };
  var scoreNum = document.getElementById('scoreNum');
  scoreNum.textContent = state.score;
  function addStar(){
    state.score += 1;
    scoreNum.textContent = state.score;
    saveScore(state.score);
    checkBadges(state.score);
  }

  /* ---- shared buddy markup (reused for every letter character) ---- */
  function buddyMarkup(ch){
    return '<span class="arm arm-l" aria-hidden="true"></span>' +
           '<span class="arm arm-r" aria-hidden="true"></span>' +
           '<div class="buddy-body">' +
             '<div class="buddy-face"><span class="eye"></span><span class="eye"></span></div>' +
             '<span class="smile" aria-hidden="true"></span>' +
             '<span class="buddy-number">' + ch + '</span>' +
           '</div>' +
           '<span class="foot foot-l" aria-hidden="true"></span>' +
           '<span class="foot foot-r" aria-hidden="true"></span>';
  }
  function makeBuddy(ch, size, colorIdx, extraClass){
    var el = document.createElement('div');
    el.className = 'buddy buddy--' + size + (extraClass ? ' ' + extraClass : '');
    el.style.setProperty('--buddy-color', colorFor(colorIdx));
    el.innerHTML = buddyMarkup(ch);
    return el;
  }

  /* ---- audio + voice helpers ---- */
  function speak(text){
    try{
      if (!('speechSynthesis' in window)) return;
      var u = new SpeechSynthesisUtterance(text);
      u.rate = 0.88; u.pitch = 1.1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(e){ /* speech not available — game still works fine */ }
  }
  var audioCtx = null;
  function tone(freq, startDelay, duration){
    try{
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      var t0 = audioCtx.currentTime + startDelay;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.linearRampToValueAtTime(0.16, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + duration + 0.02);
    }catch(e){ /* sound not available — skip silently */ }
  }
  function playClick(){ tone(640, 0, 0.08); }
  function playSuccess(){ tone(523, 0, 0.16); tone(659, 0.1, 0.16); tone(784, 0.2, 0.26); }
  function playGentle(){ tone(330, 0, 0.18); }

  function spawnConfetti(target){
    var layer = document.createElement('div');
    layer.className = 'confetti-layer';
    target.appendChild(layer);
    var colors = ['var(--c1)','var(--c2)','var(--c3)','var(--c5)','var(--c6)','var(--c7)','var(--c9)','var(--c10)'];
    for (var i = 0; i < 22; i++){
      var p = document.createElement('span');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      p.style.animationDelay = (Math.random() * 0.25) + 's';
      layer.appendChild(p);
    }
    setTimeout(function(){ if (layer.parentNode) layer.parentNode.removeChild(layer); }, 1800);
  }

  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  /* ================= GAME TABS ================= */
  var tabExploreBtn = document.getElementById('tabExploreBtn');
  var tabFindBtn = document.getElementById('tabFindBtn');
  var tabMatchBtn = document.getElementById('tabMatchBtn');
  var exploreSection = document.getElementById('exploreSection');
  var findSection = document.getElementById('findSection');
  var matchSection = document.getElementById('matchSection');

  function showTab(which){
    exploreSection.hidden = which !== 'explore';
    findSection.hidden = which !== 'find';
    matchSection.hidden = which !== 'match';
    tabExploreBtn.classList.toggle('active', which === 'explore');
    tabExploreBtn.setAttribute('aria-pressed', which === 'explore');
    tabFindBtn.classList.toggle('active', which === 'find');
    tabFindBtn.setAttribute('aria-pressed', which === 'find');
    tabMatchBtn.classList.toggle('active', which === 'match');
    tabMatchBtn.setAttribute('aria-pressed', which === 'match');
    if (which === 'find' && !findSection.dataset.started){ findSection.dataset.started = '1'; newFindRound(); }
    if (which === 'match' && !matchSection.dataset.started){ matchSection.dataset.started = '1'; newMatchRound(); }
  }
  tabExploreBtn.addEventListener('click', function(){ showTab('explore'); });
  tabFindBtn.addEventListener('click', function(){ showTab('find'); });
  tabMatchBtn.addEventListener('click', function(){ showTab('match'); });

  /* ================= EXPLORER ================= */
  var azGrid = document.getElementById('azGrid');
  var exploreRevealWrap = document.getElementById('exploreRevealWrap');
  var exploreCaption = document.getElementById('exploreCaption');
  var soundBtn = document.getElementById('soundBtn');
  var lettersFoundNum = document.getElementById('lettersFoundNum');
  var currentExploreIdx = null;

  var discovered = loadDiscovered();
  function updateLettersFoundDisplay(){ lettersFoundNum.textContent = discovered.length; }
  updateLettersFoundDisplay();

  ALPHABET.forEach(function(entry, i){
    var btn = document.createElement('button');
    btn.className = 'letter-tile';
    btn.style.setProperty('--buddy-color', colorFor(i));
    btn.style.background = colorFor(i);
    btn.style.setProperty('--i', i);
    btn.textContent = entry.letter;
    btn.setAttribute('aria-label', 'Letter ' + entry.letter);
    if (discovered.indexOf(entry.letter) !== -1){ btn.style.background = 'var(--green)'; }
    btn.addEventListener('click', function(){
      currentExploreIdx = i;
      exploreRevealWrap.innerHTML = '';
      exploreRevealWrap.appendChild(makeBuddy(entry.letter, 'reveal', i, 'pop-in'));
      exploreCaption.textContent = entry.emoji + ' ' + entry.letter + ' is for ' + entry.word;
      soundBtn.hidden = false;
      spawnConfetti(exploreRevealWrap);
      playSuccess();
      speak(entry.letter + ' is for ' + entry.word + '.');
      if (discovered.indexOf(entry.letter) === -1){
        discovered.push(entry.letter);
        saveDiscovered(discovered);
        btn.style.background = 'var(--green)';
        updateLettersFoundDisplay();
        addStar();
      }
    });
    azGrid.appendChild(btn);
  });

  soundBtn.addEventListener('click', function(){
    if (currentExploreIdx === null) return;
    var letter = ALPHABET[currentExploreIdx].letter;
    playClick();
    speak(PHONICS[letter]);
  });

  /* ---- lowercase toggle ---- */
  var caseUpperBtn = document.getElementById('caseUpperBtn');
  var caseLowerBtn = document.getElementById('caseLowerBtn');
  caseUpperBtn.addEventListener('click', function(){
    exploreSection.classList.remove('lowercase');
    caseUpperBtn.classList.add('active'); caseUpperBtn.setAttribute('aria-pressed','true');
    caseLowerBtn.classList.remove('active'); caseLowerBtn.setAttribute('aria-pressed','false');
  });
  caseLowerBtn.addEventListener('click', function(){
    exploreSection.classList.add('lowercase');
    caseLowerBtn.classList.add('active'); caseLowerBtn.setAttribute('aria-pressed','true');
    caseUpperBtn.classList.remove('active'); caseUpperBtn.setAttribute('aria-pressed','false');
  });

  /* ================= FIND THE LETTER ================= */
  var findPrompt = document.getElementById('findPrompt');
  var findChoices = document.getElementById('findChoices');
  var findTarget = null;

  function newFindRound(){
    var targetIdx = Math.floor(Math.random() * ALPHABET.length);
    var pool = ALPHABET.map(function(e, i){ return i; }).filter(function(i){ return i !== targetIdx; });
    var distractors = shuffle(pool).slice(0, 2);
    var choiceIdxs = shuffle([targetIdx, distractors[0], distractors[1]]);

    findTarget = targetIdx;
    findPrompt.textContent = 'Find the letter ' + ALPHABET[targetIdx].letter;
    findChoices.innerHTML = '';

    choiceIdxs.forEach(function(idx){
      var btn = document.createElement('button');
      btn.className = 'choice-tile';
      btn.style.background = colorFor(idx);
      btn.textContent = ALPHABET[idx].letter;
      btn.setAttribute('aria-label', 'Letter ' + ALPHABET[idx].letter);
      btn.addEventListener('click', function(){ onFindChoice(idx, btn); });
      findChoices.appendChild(btn);
    });
  }

  function onFindChoice(idx, btnEl){
    if (idx === findTarget){
      playSuccess();
      spawnConfetti(findChoices);
      speak('Yes! That is the letter ' + ALPHABET[idx].letter + '!');
      addStar();
      findPrompt.textContent = randomSuccessMessage() + ' 🎉';
      setTimeout(newFindRound, 1300);
    } else {
      playGentle();
      btnEl.classList.remove('shake'); void btnEl.offsetWidth; btnEl.classList.add('shake');
    }
  }

  /* ================= MATCH THE PICTURE ================= */
  var matchLetterWrap = document.getElementById('matchLetterWrap');
  var matchChoices = document.getElementById('matchChoices');
  var matchPrompt = document.getElementById('matchPrompt');
  var matchTarget = null;

  function newMatchRound(){
    matchPrompt.textContent = 'Which picture starts with this letter?';
    var targetIdx = Math.floor(Math.random() * ALPHABET.length);
    var pool = ALPHABET.map(function(e, i){ return i; }).filter(function(i){ return i !== targetIdx; });
    var distractors = shuffle(pool).slice(0, 2);
    var choiceIdxs = shuffle([targetIdx, distractors[0], distractors[1]]);

    matchTarget = targetIdx;
    matchLetterWrap.innerHTML = '';
    matchLetterWrap.appendChild(makeBuddy(ALPHABET[targetIdx].letter, 'reveal', targetIdx, 'pop-in'));
    matchChoices.innerHTML = '';

    choiceIdxs.forEach(function(idx){
      var card = document.createElement('button');
      card.className = 'pic-card';
      card.style.setProperty('--card-color', colorFor(idx));
      card.innerHTML = '<span class="pic-emoji">' + ALPHABET[idx].emoji + '</span>' +
                        '<span class="pic-word">' + ALPHABET[idx].word + '</span>';
      card.setAttribute('aria-label', ALPHABET[idx].word);
      card.addEventListener('click', function(){ onMatchChoice(idx, card); });
      matchChoices.appendChild(card);
    });
  }

  function onMatchChoice(idx, cardEl){
    if (idx === matchTarget){
      playSuccess();
      spawnConfetti(matchChoices);
      speak(ALPHABET[idx].letter + ' is for ' + ALPHABET[idx].word + '!');
      addStar();
      matchPrompt.textContent = randomSuccessMessage() + ' 🎉';
      setTimeout(newMatchRound, 1300);
    } else {
      playGentle();
      cardEl.classList.remove('shake'); void cardEl.offsetWidth; cardEl.classList.add('shake');
    }
  }

  /* ---- reset stars ---- */
  var resetStarsBtn = document.getElementById('resetStarsBtn');
  resetStarsBtn.addEventListener('click', function(){
    state.score = 0;
    scoreNum.textContent = 0;
    saveScore(0);
    shownBadges = [];
    saveShownBadges(shownBadges);
    discovered = [];
    saveDiscovered(discovered);
    updateLettersFoundDisplay();
    Array.prototype.forEach.call(azGrid.children, function(tile, i){
      tile.style.background = colorFor(i);
    });
  });

})();
</script>

</body>
</html>
