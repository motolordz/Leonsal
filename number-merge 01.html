<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Leon's Number Merge Playground — LeonSal.com</title>
<meta name="description" content="Tap two Number Buddies and merge them to learn addition and subtraction! A playful counting game for ages 3-7." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#131E36;
    --cloud:#F3F8FF;
    --white:#FFFFFF;
    --yellow:#FFD43B;
    --yellow-deep:#F5B400;
    --green:#3E9B22;
    --green-deep:#2E7A18;
    --shadow:0 14px 28px -10px rgba(19,30,54,0.25);

    --c1:#FF5252; --c2:#FF9636; --c3:#FFD43B; --c4:#B0D936; --c5:#4FAE32;
    --c6:#2FC4D1; --c7:#3AA0FF; --c8:#6C7AE0; --c9:#9D5DC4; --c10:#FF6FA5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:'Nunito',sans-serif;color:var(--navy);
    background:var(--cloud);min-height:100vh;
  }
  h1,h2,.brand{font-family:'Fredoka One',cursive;margin:0;}
  button{font-family:inherit;border:none;cursor:pointer;}

  .wrap{max-width:560px;margin:0 auto;padding:14px 18px 56px;}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 4px;}
  .brand{font-size:1.05rem;white-space:nowrap;}
  .brand a{text-decoration:none;display:flex;align-items:baseline;gap:1px;}
  .brand .b1{color:#3AA0FF;} .brand .b2{color:#4FAE32;} .brand .b3{color:var(--yellow-deep);
    -webkit-text-stroke:1px var(--navy);} .brand .b4{color:#FF5252;} .brand .b5{color:#2FC4D1;}
  .brand .b6{color:#9D5DC4;} .brand .b7{color:#FF9636;}
  .score-pill{
    background:var(--white);border-radius:999px;padding:8px 16px;font-family:'Fredoka One',cursive;
    font-size:1rem;color:var(--navy);box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;
  }

  /* ---- title ---- */
  .title{text-align:center;margin:14px 0 6px;}
  .title h1{font-size:clamp(1.6rem,7vw,2.1rem);color:var(--navy);line-height:1.2;}
  .instruction{
    text-align:center;font-weight:800;font-size:1.05rem;color:#3C4566;
    min-height:1.4em;margin-bottom:14px;
  }

  /* ---- mode toggle ---- */
  .mode-row{display:flex;gap:12px;margin-bottom:18px;}
  .mode-btn{
    flex:1;padding:16px 8px;border-radius:18px;font-family:'Fredoka One',cursive;
    font-size:1.05rem;background:var(--white);color:#8B93A8;box-shadow:var(--shadow);
    transition:transform .15s ease;
  }
  .mode-btn:active{transform:scale(.96);}
  .mode-btn.active.mode-add{background:var(--yellow);color:var(--navy);box-shadow:0 8px 0 0 var(--yellow-deep);}
  .mode-btn.active.mode-take{background:#7CD957;color:var(--navy);box-shadow:0 8px 0 0 var(--green-deep);}

  /* ---- play zone ---- */
  .play-zone{
    background:var(--white);border-radius:28px;padding:22px 14px;box-shadow:var(--shadow);
    margin-bottom:18px;
  }
  .slots-row{display:flex;align-items:center;justify-content:center;gap:14px;min-height:120px;}
  .slot{
    width:108px;height:108px;border-radius:26px;display:flex;align-items:center;justify-content:center;
    border:3px dashed #D9E2F5;background:#F8FBFF;cursor:default;
  }
  .slot.is-filled{border-style:solid;border-color:transparent;background:transparent;cursor:pointer;}
  .slot.is-filled .buddy-body{animation:slotGlow 1.4s ease-out infinite;}
  .slot-placeholder{font-size:2.4rem;color:#C8D3EC;}
  .operator{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--navy);width:34px;text-align:center;}

  .equation{
    text-align:center;font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--navy);
    margin-top:10px;min-height:1.4em;
  }

  .result-zone{display:flex;justify-content:center;min-height:160px;align-items:center;position:relative;}
  .zero-card{
    text-align:center;font-family:'Fredoka One',cursive;color:var(--navy);
    background:#FFF7DD;border-radius:20px;padding:18px 26px;font-size:1.2rem;
  }

  /* ---- action buttons ---- */
  .action-row{display:flex;gap:14px;justify-content:center;align-items:center;margin:8px 0 22px;}
  .btn-merge{
    padding:18px 40px;border-radius:999px;font-family:'Fredoka One',cursive;font-size:1.3rem;
    background:#DCE2F0;color:#9AA4C2;box-shadow:none;transition:transform .15s ease;
  }
  .btn-merge.is-ready{
    background:var(--yellow);color:var(--navy);box-shadow:0 8px 0 0 var(--yellow-deep);
    animation:mergePulse 1.2s ease-in-out infinite;
  }
  .btn-merge.is-ready:active{transform:scale(.95);}
  .btn-reset{
    padding:14px 22px;border-radius:999px;font-family:'Fredoka One',cursive;font-size:.95rem;
    background:var(--white);color:var(--navy);box-shadow:var(--shadow);
  }
  .btn-reset:active{transform:scale(.95);}

  /* ---- picker ---- */
  .picker-label{text-align:center;font-weight:800;color:#3C4566;margin-bottom:10px;}
  .picker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .picker-btn{
    background:transparent;display:flex;align-items:center;justify-content:center;
    padding:6px;border-radius:16px;min-height:74px;transition:transform .12s ease, opacity .2s ease;
  }
  .picker-btn:active{transform:scale(.92);}
  .picker-btn.is-disabled{opacity:.32;pointer-events:none;}
  .picker-btn.shake{animation:shake .4s ease;}

  /* ================= BUDDY CHARACTER ================= */
  .buddy{position:relative;display:inline-flex;}
  .buddy--picker{font-size:16px;}
  .buddy--slot{font-size:30px;}
  .buddy--result{font-size:42px;}
  .buddy-body{
    width:3.1em;height:3.1em;border-radius:32%;background:var(--buddy-color);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:inset 0 -0.32em 0 rgba(0,0,0,.13), 0 0.18em 0.25em rgba(0,0,0,.18);
    position:relative;
  }
  .buddy-face{display:flex;gap:0.45em;margin-bottom:0.08em;}
  .eye{width:0.46em;height:0.46em;background:#fff;border-radius:50%;position:relative;}
  .eye::after{
    content:"";position:absolute;width:0.2em;height:0.2em;background:var(--navy);
    border-radius:50%;top:58%;left:58%;transform:translate(-50%,-50%);
  }
  .smile{
    width:1em;height:0.55em;border:0.12em solid transparent;border-bottom-color:var(--navy);
    border-radius:50%;margin-top:0.06em;
  }
  .buddy-number{
    font-family:'Fredoka One',cursive;font-size:1.25em;color:#fff;margin-top:0.08em;
    text-shadow:-1px -1px 0 var(--navy),1px -1px 0 var(--navy),-1px 1px 0 var(--navy),1px 1px 0 var(--navy);
  }
  .arm{position:absolute;top:42%;width:0.85em;height:0.42em;background:var(--buddy-color);filter:brightness(.87);border-radius:1em;}
  .arm-l{left:-0.46em;transform:rotate(18deg);}
  .arm-r{right:-0.46em;transform:rotate(-18deg);}
  .foot{position:absolute;bottom:-0.28em;width:0.58em;height:0.42em;background:var(--buddy-color);filter:brightness(.8);border-radius:0.3em;}
  .foot-l{left:0.55em;}
  .foot-r{right:0.55em;}

  .pop-in{animation:popIn .6s cubic-bezier(.34,1.56,.64,1);}

  @media (prefers-reduced-motion:no-preference){
    .buddy--picker .buddy-body{animation:buddyBounce 1.8s ease-in-out infinite;animation-delay:calc(var(--i,0) * 0.09s);}
  }

  @keyframes buddyBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12%);}}
  @keyframes slotGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,212,59,.55);}50%{box-shadow:0 0 0 9px rgba(255,212,59,0);}}
  @keyframes mergePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
  @keyframes popIn{0%{transform:scale(0) rotate(-12deg);opacity:0;}60%{transform:scale(1.18) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

  /* ---- confetti ---- */
  .confetti-layer{position:absolute;inset:0;overflow:visible;pointer-events:none;}
  .confetti-piece{
    position:absolute;top:-10px;width:9px;height:14px;border-radius:2px;
    animation-name:confettiFall;animation-timing-function:ease-in;animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(260px) rotate(360deg);opacity:0;}
  }
  @media (prefers-reduced-motion:reduce){
    .confetti-piece{display:none;}
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <span class="brand">
      <a href="../index.html" aria-label="Back to LeonSal.com home">
        <span class="b1">L</span><span class="b2">e</span><span class="b3">o</span><span class="b4">n</span><span class="b5">S</span><span class="b6">a</span><span class="b7">l</span>
      </a>
    </span>
    <span class="score-pill" id="scorePill" aria-live="polite">⭐ <span id="scoreNum">0</span></span>
  </div>

  <div class="title">
    <h1>Leon's Number Merge Playground</h1>
  </div>
  <p class="instruction" id="instructionText" aria-live="polite">Tap your first number buddy!</p>

  <div class="mode-row" role="group" aria-label="Choose a game mode">
    <button class="mode-btn mode-add active" id="modeAddBtn" aria-pressed="true">ADD</button>
    <button class="mode-btn mode-take" id="modeTakeBtn" aria-pressed="false">TAKE AWAY</button>
  </div>

  <div class="play-zone">
    <div class="slots-row">
      <button class="slot" id="slot1" aria-label="First selected buddy, tap to clear"><span class="slot-placeholder">?</span></button>
      <span class="operator" id="operatorSymbol">+</span>
      <button class="slot" id="slot2" aria-label="Second selected buddy, tap to clear"><span class="slot-placeholder">?</span></button>
    </div>
    <p class="equation" id="equationText"></p>
    <div class="result-zone" id="resultZone"></div>
  </div>

  <div class="action-row">
    <button class="btn-merge" id="mergeBtn" disabled>MERGE</button>
    <button class="btn-reset" id="resetBtn">↺ Reset</button>
  </div>

  <p class="picker-label">Choose your Number Buddies!</p>
  <div class="picker-grid" id="pickerGrid"></div>

</div>

<script>
(function(){
  "use strict";

  var BUDDY_COLOR = {1:'var(--c1)',2:'var(--c2)',3:'var(--c3)',4:'var(--c4)',5:'var(--c5)',
                      6:'var(--c6)',7:'var(--c7)',8:'var(--c8)',9:'var(--c9)',10:'var(--c10)'};
  var WORDS = ['zero','one','two','three','four','five','six','seven','eight','nine','ten'];

  var state = { mode:'add', selection:[], merged:false, score:0 };

  var pickerGrid = document.getElementById('pickerGrid');
  var slot1 = document.getElementById('slot1');
  var slot2 = document.getElementById('slot2');
  var operatorSymbol = document.getElementById('operatorSymbol');
  var mergeBtn = document.getElementById('mergeBtn');
  var resetBtn = document.getElementById('resetBtn');
  var instructionText = document.getElementById('instructionText');
  var equationText = document.getElementById('equationText');
  var resultZone = document.getElementById('resultZone');
  var scoreNum = document.getElementById('scoreNum');
  var modeAddBtn = document.getElementById('modeAddBtn');
  var modeTakeBtn = document.getElementById('modeTakeBtn');

  function buddyMarkup(num){
    return '<span class="arm arm-l" aria-hidden="true"></span>' +
           '<span class="arm arm-r" aria-hidden="true"></span>' +
           '<div class="buddy-body">' +
             '<div class="buddy-face"><span class="eye"></span><span class="eye"></span></div>' +
             '<span class="smile" aria-hidden="true"></span>' +
             '<span class="buddy-number">' + num + '</span>' +
           '</div>' +
           '<span class="foot foot-l" aria-hidden="true"></span>' +
           '<span class="foot foot-r" aria-hidden="true"></span>';
  }

  function makeBuddy(num, size, extraClass){
    var el = document.createElement('div');
    el.className = 'buddy buddy--' + size + (extraClass ? ' ' + extraClass : '');
    el.style.setProperty('--buddy-color', BUDDY_COLOR[num]);
    el.innerHTML = buddyMarkup(num);
    return el;
  }

  // ---- build picker ----
  for (var n = 1; n <= 10; n++){
    (function(num){
      var btn = document.createElement('button');
      btn.className = 'picker-btn';
      btn.setAttribute('aria-label', 'Number ' + num + ' buddy');
      btn.dataset.num = num;
      var buddy = makeBuddy(num, 'picker');
      buddy.style.setProperty('--i', (num - 1));
      btn.appendChild(buddy);
      btn.addEventListener('click', function(){ onPickerTap(num, btn); });
      pickerGrid.appendChild(btn);
    })(n);
  }

  function refreshPickerStates(){
    var disabledMax = null;
    if (state.mode === 'add' && state.selection.length === 1){
      disabledMax = 10 - state.selection[0];
    }
    Array.prototype.forEach.call(pickerGrid.children, function(btn){
      var num = parseInt(btn.dataset.num, 10);
      var disabled = disabledMax !== null && num > disabledMax;
      btn.classList.toggle('is-disabled', disabled);
    });
  }

  function setInstruction(msg){ instructionText.textContent = msg; }

  function fillSlot(slotEl, num){
    slotEl.innerHTML = '';
    slotEl.appendChild(makeBuddy(num, 'slot'));
    slotEl.classList.add('is-filled');
  }

  function emptySlot(slotEl){
    slotEl.innerHTML = '<span class="slot-placeholder">?</span>';
    slotEl.classList.remove('is-filled');
  }

  function clearRound(){
    state.selection = [];
    state.merged = false;
    emptySlot(slot1);
    emptySlot(slot2);
    equationText.textContent = '';
    resultZone.innerHTML = '';
    mergeBtn.disabled = true;
    mergeBtn.classList.remove('is-ready');
    setInstruction('Tap your first number buddy!');
    refreshPickerStates();
  }

  function onPickerTap(num, btnEl){
    if (state.merged){ clearRound(); }

    if (state.selection.length === 0){
      state.selection.push(num);
      fillSlot(slot1, num);
      setInstruction('Now tap your second number buddy!');
      refreshPickerStates();
      return;
    }

    if (state.selection.length === 1){
      if (state.mode === 'add' && (state.selection[0] + num) > 10){
        btnEl.classList.remove('shake'); void btnEl.offsetWidth; btnEl.classList.add('shake');
        return;
      }
      state.selection.push(num);
      fillSlot(slot2, num);
      setInstruction('Press the big MERGE button!');
      mergeBtn.disabled = false;
      mergeBtn.classList.add('is-ready');
      refreshPickerStates();
      return;
    }

    // safety net: already 2 selected, not yet merged — restart fresh
    clearRound();
    state.selection.push(num);
    fillSlot(slot1, num);
    setInstruction('Now tap your second number buddy!');
    refreshPickerStates();
  }

  function onSlotTap(){
    if (state.selection.length === 0) return;
    clearRound();
  }
  slot1.addEventListener('click', onSlotTap);
  slot2.addEventListener('click', onSlotTap);

  function setMode(mode){
    state.mode = mode;
    modeAddBtn.classList.toggle('active', mode === 'add');
    modeAddBtn.setAttribute('aria-pressed', mode === 'add');
    modeTakeBtn.classList.toggle('active', mode === 'take');
    modeTakeBtn.setAttribute('aria-pressed', mode === 'take');
    operatorSymbol.textContent = mode === 'add' ? '+' : '−';
    clearRound();
  }
  modeAddBtn.addEventListener('click', function(){ setMode('add'); });
  modeTakeBtn.addEventListener('click', function(){ setMode('take'); });

  function spawnConfetti(){
    var layer = document.createElement('div');
    layer.className = 'confetti-layer';
    resultZone.appendChild(layer);
    var colors = ['var(--c1)','var(--c2)','var(--c3)','var(--c5)','var(--c6)','var(--c7)','var(--c9)','var(--c10)'];
    for (var i = 0; i < 22; i++){
      var p = document.createElement('span');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      p.style.animationDelay = (Math.random() * 0.25) + 's';
      layer.appendChild(p);
    }
    setTimeout(function(){ if (layer.parentNode) layer.parentNode.removeChild(layer); }, 1800);
  }

  function speak(text){
    try{
      if (!('speechSynthesis' in window)) return;
      var u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9; u.pitch = 1.1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(e){ /* speech not available — game still works fine */ }
  }

  var audioCtx = null;
  function tone(freq, startDelay, duration){
    try{
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      var t0 = audioCtx.currentTime + startDelay;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.linearRampToValueAtTime(0.16, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + duration + 0.02);
    }catch(e){ /* sound not available — skip silently */ }
  }
  function playClick(){ tone(640, 0, 0.08); }
  function playSuccess(){ tone(523, 0, 0.16); tone(659, 0.1, 0.16); tone(784, 0.2, 0.26); }

  function cap(word){ return word.charAt(0).toUpperCase() + word.slice(1); }

  mergeBtn.addEventListener('click', function(){
    if (state.selection.length !== 2 || state.merged) return;
    state.merged = true;
    mergeBtn.classList.remove('is-ready');
    mergeBtn.disabled = true;

    var a = state.selection[0], b = state.selection[1], result, eq, speechSentence;

    if (state.mode === 'add'){
      result = a + b;
      eq = a + ' + ' + b + ' = ' + result;
      speechSentence = cap(WORDS[a]) + ' plus ' + WORDS[b] + ' equals ' + WORDS[result] + '.';
    } else {
      var hi = Math.max(a, b), lo = Math.min(a, b);
      result = hi - lo;
      eq = hi + ' - ' + lo + ' = ' + result;
      speechSentence = cap(WORDS[hi]) + ' take away ' + WORDS[lo] + ' equals ' + WORDS[result] + '.';
    }

    equationText.textContent = eq;
    resultZone.innerHTML = '';

    if (result === 0){
      var card = document.createElement('div');
      card.className = 'zero-card pop-in';
      card.innerHTML = 'All gone!<br>That makes zero. 🎉';
      resultZone.appendChild(card);
    } else {
      var rb = makeBuddy(result, 'result', 'pop-in');
      resultZone.appendChild(rb);
    }

    spawnConfetti();
    playSuccess();
    speak(speechSentence);

    state.score += 1;
    scoreNum.textContent = state.score;

    setInstruction('Great merging! Tap a buddy to play again.');
    refreshPickerStates();
  });

  // give picker taps a tiny click sound too
  pickerGrid.addEventListener('click', function(e){
    var btn = e.target.closest ? e.target.closest('.picker-btn') : null;
    if (btn && !btn.classList.contains('is-disabled')) playClick();
  });

  resetBtn.addEventListener('click', clearRound);

  setMode('add');
})();
</script>

</body>
</html>
